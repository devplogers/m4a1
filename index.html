<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3D Portfolio Fix</title>
    <style>
        body { margin: 0; background: #080808; color: #fff; font-family: sans-serif; overflow: hidden; }
        #menu { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 100; }
        .btn { padding: 12px 25px; background: rgba(255,255,255,0.1); border: 1px solid #444; cursor: pointer; border-radius: 8px; transition: 0.3s; color: #ccc; font-weight: bold; }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .active { border-color: #00d4ff; color: #00d4ff; background: rgba(0, 212, 255, 0.1); }
        #info { position: fixed; top: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 8px; font-size: 12px; border-radius: 4px; }
    </style>
</head>
<body>

<div id="info">Статус: Инициализация...</div>
<div id="menu">
    <div class="btn active" onclick="load('money', this)">Деньги</div>
    <div class="btn" onclick="load('m4', this)">M4</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, model, controls;
    const loader = new GLTFLoader();
    const info = document.getElementById('info');

    function init() {
        scene = new THREE.Scene();
        
        // Камеру ставим чуть дальше (Z=7), чтобы модель не обрезало
        camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 7);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping; // Делает цвета сочнее
        document.body.appendChild(renderer.domElement);

        // ЯРКИЙ СВЕТ (чтобы M4 не была черной)
        scene.add(new THREE.AmbientLight(0xffffff, 1.2)); // Общий свет везде
        
        const sun = new THREE.DirectionalLight(0xffffff, 3);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        const fillLight = new THREE.PointLight(0x00d4ff, 2); // Голубая подсветка сбоку
        fillLight.position.set(-5, 2, -5);
        scene.add(fillLight);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        load('money');
        animate();
    }

    window.load = (name, btn) => {
        if (btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        if (model) scene.remove(model);
        info.innerText = "Загрузка: " + name;

        loader.load(name + '.glb', (gltf) => {
            model = gltf.scene;
            
            // Фикс масштаба и центрирования
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            model.position.x += (model.position.x - center.x);
            model.position.y += (model.position.y - center.y);
            model.position.z += (model.position.z - center.z);

            // Настройка материалов под Гитхаб
            model.traverse(n => {
                if (n.isMesh) {
                    if (name === 'money') {
                        n.material.metalness = 0;
                        n.material.roughness = 1;
                        n.material.emissive = new THREE.Color(0x000000); // Чтобы не светилась
                    } else {
                        // Для M4: убавляем металл до 0.8, чтобы она не была черной
                        n.material.metalness = 0.7; 
                        n.material.roughness = 0.2;
                        n.material.color.set(0x888888); // Делаем сам металл серым
                    }
                }
            });

            scene.add(model);
            info.innerText = "Показываю: " + name;
        }, undefined, (e) => {
            info.innerText = "Ошибка: Файл не найден!";
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (model) model.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
