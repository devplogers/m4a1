<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Portfolio | Money & Models</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: white; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* Меню (Стеклянный эффект) */
        #ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
        }

        .btn:hover { 
            background: rgba(255, 255, 255, 0.15); 
            transform: translateY(-5px);
            color: white;
        }

        .btn.active { 
            border-color: #00d4ff; 
            color: #00d4ff; 
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        /* Статус загрузки */
        #loader {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            pointer-events: none;
            border-left: 3px solid #00d4ff;
        }
    </style>
</head>
<body>

<div id="loader">Ожидание...</div>

<div id="ui">
    <div class="btn" onclick="changeModel('robot', this)">Робот</div>
    <div class="btn active" onclick="changeModel('money', this)">Деньги</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const loaderEl = document.getElementById('loader');
    let scene, camera, renderer, currentModel, controls;
    const gltfLoader = new GLTFLoader();

    init();
    animate();

    function init() {
        // Сцена
        scene = new THREE.Scene();
        
        // Камера
        camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 6);

        // Рендерер
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Оптимизация для ретины
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // Окружение и свет
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 2);
        mainLight.position.set(5, 10, 7.5);
        scene.add(mainLight);

        // Управление мышкой
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Загружаем деньги по умолчанию
        loadModel('money.glb');

        window.addEventListener('resize', onWindowResize);
    }

    function loadModel(fileName) {
        loaderEl.style.color = "white";
        loaderEl.innerText = "Загрузка " + fileName + "...";

        if (currentModel) {
            scene.remove(currentModel);
        }

        gltfLoader.load(
            fileName, 
            (gltf) => {
                currentModel = gltf.scene;
                
                currentModel.traverse((child) => {
                    if (child.isMesh) {
                        // Настройка материалов: для денег отключаем металл
                        if (fileName.includes('money')) {
                            child.material.metalness = 0;
                            child.material.roughness = 0.7;
                        } else {
                            // Для остальных (робота) ставим хром
                            child.material.metalness = 1;
                            child.material.roughness = 0.1;
                        }
                    }
                });

                // Центрируем модель автоматически
                const box = new THREE.Box3().setFromObject(currentModel);
                const center = box.getCenter(new THREE.Vector3());
                currentModel.position.sub(center);
                
                scene.add(currentModel);
                loaderEl.innerText = "Модель: " + fileName;
            },
            (xhr) => {
                const percent = Math.round((xhr.loaded / xhr.total) * 100);
                if (percent) loaderEl.innerText = `Загружено: ${percent}%`;
            },
            (error) => {
                loaderEl.style.color = "#ff4444";
                loaderEl.innerText = "ОШИБКА: Файл " + fileName + " не найден!";
                console.error(error);
            }
        );
    }

    // Глобальная функция для кнопок
    window.changeModel = (name, btn) => {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadModel(name + '.glb');
    };

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        
        if (currentModel) {
            currentModel.rotation.y += 0.005; // Медленное вращение
        }
        
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
