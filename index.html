<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <style>
        body { margin: 0; background: #050505; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* Меню */
        #ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 1px;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-3px); }
        .btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0, 212, 255, 0.1); }

        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 8px;
            pointer-events: none;
            border-left: 3px solid #00d4ff;
        }
    </style>
</head>
<body>

<div id="status">Загрузка системы...</div>

<div id="ui">
    <div id="btn-money" class="btn active" onclick="changeModel('money', this)">Деньги</div>
    <div id="btn-m4" class="btn" onclick="changeModel('m4', this)">Винтовка M4</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const statusEl = document.getElementById('status');
    let scene, camera, renderer, currentModel, controls;
    const loader = new GLTFLoader();

    function init() {
        scene = new THREE.Scene();
        
        // Камера подальше, чтобы модель не обрезало (Z=8)
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        // Улучшаем цветопередачу
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5; 
        document.body.appendChild(renderer.domElement);

        // --- МОЩНЫЙ СВЕТ ---
        // 1. Заполняющий свет (чтобы не было черных зон)
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // 2. Основной направленный свет
        const sun = new THREE.DirectionalLight(0xffffff, 2.5);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        // 3. Контурный свет (синеватый, для стиля)
        const rimLight = new THREE.PointLight(0x00d4ff, 2);
        rimLight.position.set(-5, 2, -5);
        scene.add(rimLight);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Грузим деньги при старте
        loadModel('money.glb');

        window.addEventListener('resize', onWindowResize);
    }

    function loadModel(url) {
        statusEl.style.color = "white";
        statusEl.innerText = "Гружу: " + url;

        if (currentModel) scene.remove(currentModel);

        loader.load(url, (gltf) => {
            currentModel = gltf.scene;
            
            // Центрирование и автоматический масштаб
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            // Сдвигаем модель в центр сцены
            currentModel.position.sub(center);
            
            // Если модель слишком маленькая (как деньги из Blockbench), чуть увеличим
            if (size.x < 1) currentModel.scale.set(2, 2, 2);

            currentModel.traverse((child) => {
                if (child.isMesh) {
                    if (url.includes('money')) {
                        child.material.metalness = 0;
                        child.material.roughness = 1;
                    } else {
                        // ФИКС ДЛЯ M4 (чтобы не была черной)
                        child.material.color.set(0x777777); // Делаем серым металлом
                        child.material.metalness = 0.6;     // Убавляем зеркальность
                        child.material.roughness = 0.3;     // Добавляем матовости
                    }
                }
            });

            scene.add(currentModel);
            statusEl.innerText = "Отображается: " + url;
        }, 
        (xhr) => {
            const p = Math.round((xhr.loaded / xhr.total) * 100);
            if (p) statusEl.innerText = "Загрузка: " + p + "%";
        },
        (err) => {
            statusEl.style.color = "#ff4444";
            statusEl.innerText = "ОШИБКА: " + url + " не найден в папке!";
        });
    }

    // Глобальная функция смены моделей
    window.changeModel = (name, btn) => {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadModel(name + '.glb');
    };

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (currentModel) currentModel.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }

    init();
    animate();
</script>
</body>
</html>
