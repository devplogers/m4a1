<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Fix Express</title>
    <style>
        body { margin: 0; background: #020202; color: #fff; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; backdrop-filter: blur(10px);
        }
        .btn {
            padding: 10px 20px; background: #222; border: 1px solid #444; 
            cursor: pointer; border-radius: 8px; color: #fff; font-weight: bold;
        }
        .btn:hover { background: #333; }
        .active { border-color: #00d4ff; color: #00d4ff; }
        #status { position: fixed; top: 10px; left: 10px; font-size: 11px; color: #555; }
    </style>
</head>
<body>

<div id="status">Status: Ready</div>
<div id="ui">
    <div class="btn active" onclick="load('money', this)">Деньги</div>
    <div class="btn" onclick="load('m4', this)">Винтовка M4</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, model, controls;
    const loader = new GLTFLoader();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 10); // Отодвинули подальше на старт

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 2.0; // Врубили яркость на максимум
        document.body.appendChild(renderer.domElement);

        // СВЕТА МНОГО НЕ БЫВАЕТ
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 3)); // Небо/земля
        const sun = new THREE.DirectionalLight(0xffffff, 4);
        sun.position.set(5, 5, 5);
        scene.add(sun);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        load('money');
        animate();
    }

    window.load = (name, btn) => {
        if (btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        if (model) scene.remove(model);
        document.getElementById('status').innerText = "Loading: " + name;

        loader.load(name + '.glb', (gltf) => {
            model = gltf.scene;
            
            // ГЕОМЕТРИЧЕСКИЙ ФИКС
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            model.position.sub(center); // Центрируем объект

            // Авто-зум камеры под размер модели
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
            cameraZ *= 1.5; // Запас, чтобы не обрезало
            camera.position.z = cameraZ;
            camera.updateProjectionMatrix();

            model.traverse(n => {
                if (n.isMesh) {
                    // Чтобы M4 не была черной, а деньги — серыми
                    if (name === 'money') {
                        n.material.metalness = 0;
                        n.material.roughness = 1;
                    } else {
                        n.material.color.set(0x999999); // Светло-серый металл
                        n.material.metalness = 0.4;
                        n.material.roughness = 0.2;
                    }
                }
            });

            scene.add(model);
            document.getElementById('status').innerText = "Showing: " + name;
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (model) model.rotation.y += 0.003;
        controls.update();
        renderer.render(scene, camera);
    }

    init();
</script>
</body>
</html>
