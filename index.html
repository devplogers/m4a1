<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Fix Express - White Heart</title>
    <style>
        body { margin: 0; background: #010101; color: #fff; overflow: hidden; font-family: sans-serif; }
        #ui {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; z-index: 100;
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 15px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn {
            padding: 10px 20px; background: #000; border: 1px solid #333; 
            cursor: pointer; border-radius: 8px; color: #666; font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #111; color: #fff; }
        .active { border-color: #fff; color: #fff; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        #status { position: fixed; top: 10px; left: 10px; font-size: 11px; color: #333; }
    </style>
</head>
<body>

<div id="status">Status: Ready</div>
<div id="ui">
    <div class="btn active" onclick="load('heart', this)">Сердце М</div>
    <div class="btn" onclick="load('money', this)">Деньги</div>
    <div class="btn" onclick="load('m4', this)">Винтовка M4</div>
</div>

<script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" 
        } 
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    let scene, camera, renderer, model, controls, composer;
    const loader = new GLTFLoader();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(40, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.LinearToneMapping;
        renderer.toneMappingExposure = 1.0; 
        document.body.appendChild(renderer.domElement);

        // Мягкий свет
        scene.add(new THREE.HemisphereLight(0xffffff, 0x000000, 1.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Настройка Bloom (как на деньгах)
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.4, 0.8);
        bloomPass.threshold = 0.9; 
        bloomPass.strength = 0.3;  
        bloomPass.radius = 0.5;    

        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        load('heart');
        animate();
    }

    window.load = (name, btn) => {
        if (btn) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
        
        if (model) scene.remove(model);
        document.getElementById('status').innerText = "Loading: " + name;

        loader.load(name + '.glb', (gltf) => {
            model = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            model.position.sub(center);

            // Поворачиваем ВЕРТИКАЛЬНО (если лежало)
            model.rotation.x = Math.PI / 2;

            const maxDim = Math.max(size.x, size.y, size.z);
            camera.position.z = maxDim * 2.5;

            model.traverse(n => {
                if (n.isMesh) {
                    if (name === 'heart') {
                        n.material = new THREE.MeshStandardMaterial({
                            color: 0xffffff,
                            roughness: 0.2,
                            metalness: 0.1,
                            emissive: 0xffffff,
                            emissiveIntensity: 0.1 // Совсем легкое свечение
                        });
                    } else if (name === 'money') {
                        n.material.metalness = 0;
                        n.material.roughness = 1;
                    } else {
                        n.material.color.set(0x999999);
                        n.material.metalness = 0.4;
                        n.material.roughness = 0.2;
                    }
                }
            });

            scene.add(model);
            document.getElementById('status').innerText = "Showing: " + name;
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        if (model) model.rotation.y += 0.005; // Крутится вокруг своей оси
        controls.update();
        composer.render(); 
    }

    init();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
