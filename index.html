<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Showroom</title>
    <style>
        body { margin: 0; background: #050505; color: white; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        /* Стеклянное меню */
        #ui {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: bold;
            color: rgba(255,255,255,0.7);
        }

        .btn:hover { background: rgba(255, 255, 255, 0.15); transform: translateY(-3px); }
        .btn.active { border-color: #00d4ff; color: #00d4ff; background: rgba(0, 212, 255, 0.1); }

        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="status">Загрузка скриптов...</div>

<div id="ui">
    <div class="btn active" onclick="changeModel('money', this)">Деньги</div>
    <div class="btn" onclick="changeModel('m4', this)">M4</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const statusEl = document.getElementById('status');
    let scene, camera, renderer, currentModel, controls;
    const loader = new GLTFLoader();

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // Освещение
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sun = new THREE.DirectionalLight(0xffffff, 2);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Загружаем первую модель (money.glb)
        loadModel('money.glb');

        window.addEventListener('resize', onWindowResize);
    }

    function loadModel(url) {
        statusEl.style.color = "white";
        statusEl.innerText = "Гружу " + url + "...";

        if (currentModel) scene.remove(currentModel);

        loader.load(url, (gltf) => {
            currentModel = gltf.scene;
            
            currentModel.traverse((child) => {
                if (child.isMesh) {
                    // Применяем логику материалов
                    if (url.includes('money')) {
                        child.material.metalness = 0; // Матовая бумага
                        child.material.roughness = 0.8;
                    } else {
                        child.material.metalness = 1; // Жидкий металл для M4
                        child.material.roughness = 0.1;
                    }
                }
            });

            // Авто-центрирование
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            currentModel.position.sub(center);
            
            scene.add(currentModel);
            statusEl.innerText = "Файл: " + url;
        }, 
        (xhr) => {
            const p = Math.round((xhr.loaded / xhr.total) * 100);
            if (p) statusEl.innerText = "Загрузка: " + p + "%";
        },
        (err) => {
            statusEl.style.color = "#ff4444";
            statusEl.innerText = "ОШИБКА: " + url + " не найден!";
        });
    }

    // Обработчик кнопок
    window.changeModel = (name, btn) => {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadModel(name + '.glb');
    };

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (currentModel) currentModel.rotation.y += 0.005;
        controls.update();
        renderer.render(scene, camera);
    }

    init();
    animate();
</script>
</body>
</html>
