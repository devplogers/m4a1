<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>3D Portfolio Selector</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        canvas { display: block; }

        /* Красивое меню */
        .ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        .card {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            text-align: center;
            border: 2px solid transparent;
        }

        .card:hover {
            transform: translateY(-15px) scale(1.1);
            background: rgba(255, 255, 255, 0.2);
        }

        .card.active {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .card img { width: 80%; height: auto; pointer-events: none; }
    </style>
</head>
<body>

<div class="ui-container">
    <div class="card active" onclick="selectModel('robot', this)">🤖<br>ROBOT</div>
    <div class="card" onclick="selectModel('money', this)">💵<br>MONEY</div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    let scene, camera, renderer, controls, currentModel;
    const loader = new GLTFLoader();

    init();
    animate();

    function init() {
        scene = new THREE.Scene();
        
        // Камера
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1, 3);

        // Рендерер
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Свет
        const light1 = new THREE.DirectionalLight(0xffffff, 1);
        light1.position.set(5, 5, 5);
        scene.add(light1);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // Контроли
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Загружаем первую модель по умолчанию
        loadModel('robot');

        window.addEventListener('resize', onWindowResize);
    }

    function loadModel(name) {
        if (currentModel) scene.remove(currentModel);

        // Путь к файлу (замени на свои названия)
        const path = name === 'money' ? 'money.glb' : 'robot.glb';

        loader.load(path, (gltf) => {
            currentModel = gltf.scene;
            
            currentModel.traverse((child) => {
                if (child.isMesh) {
                    if (name === 'money') {
                        // Матовый материал для денег (текстура подтянется сама из .glb)
                        child.material.metalness = 0;
                        child.material.roughness = 1;
                    } else {
                        // Жидкий металл для остальных
                        child.material.metalness = 1;
                        child.material.roughness = 0.1;
                        child.material.color.set(0xaaaaaa);
                    }
                }
            });

            // Центрируем модель
            const box = new THREE.Box3().setFromObject(currentModel);
            const center = box.getCenter(new THREE.Vector3());
            currentModel.position.sub(center);
            
            scene.add(currentModel);
            
            // Анимация появления
            currentModel.scale.set(0,0,0);
        }, undefined, (error) => {
            console.error('Файл не найден, проверь название:', path);
        });
    }

    // Функция переключения из меню
    window.selectModel = (type, el) => {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        loadModel(type);
    };

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        if (currentModel) {
            currentModel.rotation.y += 0.01; // Плавное вращение
            // Плавное увеличение при появлении
            if (currentModel.scale.x < 1) {
                currentModel.scale.addScalar(0.05);
            }
        }
        controls.update();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
